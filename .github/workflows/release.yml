on:
  release:
    types: [published]
  workflow_dispatch:
name: Release

jobs:
  version:
    name: Check version & tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Check tags
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          sudo apt-get install jq
          VERSION="$(cat package.json | jq -r '.["version"]')"
          if [ "$VERSION" != "$TAG" ]; then
            printf "ERROR: release tag $TAG is not equal to package version $VERSION\n"
            exit 1
          fi

  build:
    needs: version
    name: Build
    runs-on: ubuntu-latest
    # `id-token: write` is required for npm Trusted Publishers (OIDC).
    # Without it, npm publish falls back to token auth and fails.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22.14+ ships npm 11.5.1+, which is required for OIDC publishing.
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Deploy package
        # No NODE_AUTH_TOKEN: trusted publishers authenticates via the OIDC
        # token from `id-token: write`. `--provenance` records a signed
        # attestation linking this published version to this workflow run.
        run: npm publish --access public --provenance
