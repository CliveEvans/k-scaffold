on:
  release:
    types: [published]
  workflow_dispatch:
name: Release

jobs:
  version:
    name: Check version & tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Check tags
        env:
          # Release event sets RELEASE_TAG; manual workflow_dispatch sets
          # neither, so we fall back to ref_name when the workflow was
          # dispatched from a tag ref. On a branch ref (no tag at all),
          # we skip the equality check and publish package.json as-is.
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          sudo apt-get install -y jq
          VERSION="$(jq -r '.version' package.json)"
          if [ -n "$RELEASE_TAG" ]; then
            TAG="$RELEASE_TAG"
          elif [ "$REF_TYPE" = "tag" ]; then
            TAG="$REF_NAME"
          else
            echo "Manual dispatch on branch '$REF_NAME' — skipping tag/version equality check."
            echo "Will publish package.json version '$VERSION' as-is."
            exit 0
          fi
          if [ "$VERSION" != "$TAG" ]; then
            printf "ERROR: tag '%s' does not match package.json version '%s'\n" "$TAG" "$VERSION"
            exit 1
          fi
          echo "OK: tag '$TAG' matches package.json version '$VERSION'"

  build:
    needs: version
    name: Build
    runs-on: ubuntu-latest
    # `id-token: write` is required for npm Trusted Publishers (OIDC).
    # Without it, npm publish falls back to token auth and fails.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11.x, which is required for OIDC trusted-publisher
          # publishing. Node 22 LTS stays on npm 10.x and does not fetch the
          # `npm:registry.npmjs.org`-audience OIDC token at publish time, so
          # publishing falls back to anonymous and the registry returns 404.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Deploy package
        # No NODE_AUTH_TOKEN: trusted publishers authenticates via the OIDC
        # token from `id-token: write`. `--provenance` records a signed
        # attestation linking this published version to this workflow run.
        run: npm publish --access public --provenance
